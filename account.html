<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Account — AuditMyStore</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230891b2'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='11' font-weight='700' font-family='sans-serif'>AMS</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;--paper:#ffffff;--paper2:#f8fafc;--paper3:#f1f5f9;--paper4:#e2e8f0;--teal:#0891b2;--teal-l:#e0f2fe;--teal-d:#0e7490;--green:#059669;--red:#dc2626;--orange:#ea580c;--yellow:#d97706;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.1)}
[data-theme="dark"]{--ink:#f1f5f9;--ink2:#cbd5e1;--ink3:#94a3b8;--ink4:#64748b;--paper:#0f172a;--paper2:#1e293b;--paper3:#253347;--paper4:#334155;--teal:#22d3ee;--teal-l:rgba(34,211,238,.12);--teal-d:#06b6d4;--green:#4ade80;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);--shadow-lg:0 8px 32px rgba(0,0,0,.4)}
body{font-family:'Quicksand',sans-serif;background:var(--paper2);color:var(--ink);min-height:100vh;transition:background .3s,color .3s}
nav{background:var(--paper);border-bottom:1px solid var(--paper4);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:36px;height:36px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px}
.nav-name{font-size:18px;font-weight:700;color:var(--ink)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-link{font-size:14px;color:var(--ink3);text-decoration:none;font-weight:600;padding:8px 12px;border-radius:8px;transition:all .15s}
.nav-link:hover{background:var(--paper3);color:var(--ink)}
.theme-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--paper4);background:var(--paper2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s}
.theme-btn:hover{background:var(--paper3);border-color:var(--teal)}
.main{max-width:700px;margin:0 auto;padding:48px 24px}
.page-title{font-size:32px;font-weight:700;color:var(--ink);letter-spacing:-.3px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--ink3);font-weight:500;margin-bottom:32px}
.cards{display:flex;flex-direction:column;gap:16px}
.card{background:var(--paper);border:1px solid var(--paper4);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.card-ttl{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--paper3)}
.info-row:last-of-type{border:none;padding-bottom:0}
.info-lbl{font-size:14px;color:var(--ink3);font-weight:500}
.info-val{font-size:14px;font-weight:700;color:var(--ink)}
.bdg{padding:4px 10px;border-radius:100px;font-size:12px;font-weight:700}
.bdg-g{background:#dcfce7;color:var(--green)}
[data-theme="dark"] .bdg-g{background:rgba(74,222,128,.15)}
.bdg-t{background:var(--teal-l);color:var(--teal-d)}
[data-theme="dark"] .bdg-t{color:var(--teal)}
.bdg-o{background:#fff7ed;color:var(--orange)}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;border:none;font-family:'Quicksand',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-t{background:var(--teal);color:white}
.btn-t:hover{background:var(--teal-d);transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
.btn-o:hover{background:var(--teal-l)}
.btn-d{background:transparent;color:var(--red);border:1.5px solid #fecaca}
.btn-d:hover{background:#fef2f2}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.warn-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--orange);font-weight:500}
[data-theme="dark"] .warn-box{background:rgba(234,88,12,.1);border-color:rgba(234,88,12,.3)}
.form-row{margin-bottom:12px}
.form-lbl{display:block;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:5px}
.input{width:100%;padding:10px 14px;border:1.5px solid var(--paper4);border-radius:8px;font-size:14px;color:var(--ink);background:var(--paper2);transition:all .15s;font-family:'Quicksand',sans-serif;outline:none;font-weight:500}
.input:focus{border-color:var(--teal);background:var(--paper);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.suc{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;font-weight:500}
[data-theme="dark"] .suc{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3)}
.err{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;font-weight:500}
.loading{text-align:center;padding:80px 24px;color:var(--ink3)}
.spinner{width:40px;height:40px;border:3px solid var(--paper4);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-logo">AMS</div>
    <span class="nav-name">AuditMyStore</span>
  </a>
  <div class="nav-r">
    <a href="app.html" class="nav-link">← Go to App</a>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button onclick="doLogout()" class="btn btn-d" style="padding:8px 16px;font-size:13px">Log Out</button>
  </div>
</nav>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><p style="font-weight:500">Loading your account...</p></div>
</div>

<script>
let token=localStorage.getItem('ams_session_token');
let uData=null;
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('theme-btn').textContent=d?'🌙':'☀️';localStorage.setItem('ams_theme',d?'light':'dark')}
const th=localStorage.getItem('ams_theme')||'light';
document.documentElement.setAttribute('data-theme',th);
document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('theme-btn');if(b)b.textContent=th==='dark'?'☀️':'🌙'});

async function loadAccount(){
  if(!token){window.location.href='login.html';return}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'verify-token',token})});
    const d=await r.json();
    if(!d.valid){window.location.href='login.html';return}
    uData=d;
    let sub=null;
    try{const sr=await fetch('/api/account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'info',email:d.email})});if(sr.ok)sub=await sr.json()}catch(e){}
    render(d,sub);
  }catch(e){window.location.href='login.html'}
}

function render(u,sub){
  const plan=u.plan==='monthly'?'Monthly':'Lifetime';
  const status=sub?.status||'active';
  const renewal=sub?.currentPeriodEnd?new Date(sub.currentPeriodEnd*1000).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):null;
  const cancel=sub?.cancelAtPeriodEnd;
  document.getElementById('main').innerHTML=`
    <div class="page-title">My Account</div>
    <div class="page-sub">Manage your AuditMyStore Pro subscription</div>
    <div class="cards">
      <div class="card">
        <div class="card-ttl">Subscription</div>
        <div class="info-row"><span class="info-lbl">Email</span><span class="info-val">${u.email}</span></div>
        <div class="info-row"><span class="info-lbl">Plan</span><span class="bdg bdg-t">${plan} Pro</span></div>
        <div class="info-row"><span class="info-lbl">Status</span><span class="bdg ${status==='active'?'bdg-g':'bdg-o'}">${status==='active'?'✓ Active':status}</span></div>
        ${renewal&&plan!=='Lifetime'?`<div class="info-row"><span class="info-lbl">Next Billing</span><span class="info-val">${renewal}</span></div>`:''}
        ${plan==='Lifetime'?`<div class="info-row"><span class="info-lbl">Access</span><span class="info-val">Lifetime ♾</span></div>`:''}
        ${cancel?`<div class="warn-box">⚠ Subscription cancelled — access ends on ${renewal}</div>`:''}
        <div class="btn-row">
          <button onclick="openPortal()" class="btn btn-t">Manage Subscription →</button>
          <a href="app.html" class="btn btn-o">Go to Analyzer</a>
        </div>
      </div>
      <div class="card">
        <div class="card-ttl">Change Password</div>
        <div id="pw-suc" class="suc"></div>
        <div id="pw-err" class="err"></div>
        <div class="form-row"><label class="form-lbl">New Password</label><input id="new-pw" type="password" class="input" placeholder="Min 6 characters"/></div>
        <div class="form-row"><label class="form-lbl">Confirm Password</label><input id="conf-pw" type="password" class="input" placeholder="Repeat password"/></div>
        <button onclick="changePw()" class="btn btn-o">Update Password</button>
      </div>
      <div class="card" style="border-color:#fecaca">
        <div class="card-ttl" style="color:var(--red)">Session</div>
        <p style="font-size:14px;color:var(--ink3);margin-bottom:16px;font-weight:500">Log out from this device. Your Pro access remains active.</p>
        <button onclick="doLogout()" class="btn btn-d">Log Out</button>
      </div>
    </div>
  `;
}

async function openPortal(){
  try{
    const r=await fetch('/api/account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'portal',email:uData.email})});
    const d=await r.json();
    if(d.url)window.location.href=d.url;else alert(d.error||'Could not open portal');
  }catch(e){alert('Error opening portal')}
}

async function changePw(){
  const np=document.getElementById('new-pw').value;
  const c=document.getElementById('conf-pw').value;
  const err=document.getElementById('pw-err');
  const suc=document.getElementById('pw-suc');
  err.style.display='none';suc.style.display='none';
  if(np.length<6){err.textContent='Password must be at least 6 characters';err.style.display='block';return}
  if(np!==c){err.textContent='Passwords do not match';err.style.display='block';return}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'change-password',token,newPassword:np})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.error||'Failed';err.style.display='block';return}
    suc.textContent='✅ Password updated successfully!';suc.style.display='block';
    document.getElementById('new-pw').value='';document.getElementById('conf-pw').value='';
  }catch(e){err.textContent='Error updating password';err.style.display='block'}
}

function doLogout(){localStorage.removeItem('ams_session_token');localStorage.removeItem('ams_unlocked');window.location.href='login.html'}
loadAccount();
</script>
</body>
</html>
